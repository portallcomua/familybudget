name: AI Issue Worker

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  ai-work:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare task
        run: |
          cat > task.txt <<'EOF'
          Ти працюєш з WordPress-плагіном Family Budget.
          Виконай задачу з GitHub Issue.
          Не видаляй існуючий функціонал.
          Пиши код акуратно, без ламання структури.

          ISSUE TITLE:
          ${{ github.event.issue.title }}

          ISSUE BODY:
          ${{ github.event.issue.body }}
          EOF

      - name: Install Aider
        run: |
          python -m pip install --upgrade pip
          pip install aider-chat

      - name: Run AI edit
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          aider --yes --auto-commits --message-file task.txt

      - name: Push changes
        run: |
          git config user.name "familybudget-ai-bot"
          git config user.email "actions@github.com"
          git push || echo "Nothing to push"

      - name: Get Current Date for Release
        id: date
        run: echo "date=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Auto Create GitHub Release
        # Спрацює, якщо в тексті або заголовку є слово "реліз" або "release"
        if: contains(github.event.issue.title, 'реліз') || contains(github.event.issue.body, 'реліз') || contains(github.event.issue.title, 'release') || contains(github.event.issue.body, 'release')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.date.outputs.date }}"
          name: "Release v${{ steps.date.outputs.date }}"
          body: "Автоматичний реліз від ШІ на основі Issue #${{ github.event.issue.number }}."
          draft: false
          prerelease: false

      - name: Comment result
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'AI workflow finished. Файли відредаговано, новий реліз створено успішно!'
            })
