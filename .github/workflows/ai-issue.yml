name: Family Budget Release

'on':
  workflow_dispatch:
    inputs:
      release_version:
        description: "Version"
        required: true
        default: "4.2.2"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config user.name "familybudget-bot"
          git config user.email "actions@github.com"

      - name: Rebuild structure
        run: |
          VERSION="${{ github.event.inputs.release_version }}"

          mkdir -p old_version
          mkdir -p family-budget-network

          if [ -f family-budget-network-4.1.0-beta.zip ]; then
            rm -rf /tmp/fbn
            mkdir -p /tmp/fbn
            unzip -oq family-budget-network-4.1.0-beta.zip -d /tmp/fbn
            SRC_FILE=$(find /tmp/fbn -type f -name "family-budget-network.php" | head -1)
            if [ -n "$SRC_FILE" ]; then
              SRC_DIR=$(dirname "$SRC_FILE")
              cp -R "$SRC_DIR"/. family-budget-network/
              mv -f family-budget-network-4.1.0-beta.zip old_version/ || true
            fi
          fi

          if [ -f family-budget-network.php ]; then
            cp -f family-budget-network.php old_version/root-family-budget-network.php
            if [ ! -f family-budget-network/family-budget-network.php ]; then
              cp -f family-budget-network.php family-budget-network/family-budget-network.php
            fi
            rm -f family-budget-network.php
          fi

          if [ ! -f family-budget-network/family-budget-network.php ]; then
            echo "Main plugin file missing"
            exit 1
          fi

          perl -0777 -i -pe "s/Version:\s*.*$/Version: $VERSION/m" family-budget-network/family-budget-network.php
          perl -0777 -i -pe "s/Author:\s*.*$/Author: UAServer/m" family-budget-network/family-budget-network.php

          perl -0777 -i -pe "s/\$plugin_slug\s*=\s*plugin_basename\(__FILE__\);/\$plugin_slug = 'family-budget-network';\n    \$plugin_file = 'family-budget-network\/family-budget-network.php';/g" family-budget-network/family-budget-network.php
          perl -0777 -i -pe "s/\$plugin_info->slug\s*=\s*\$plugin_slug;/\$plugin_info->slug = 'family-budget-network';\n        \$plugin_info->plugin = 'family-budget-network\/family-budget-network.php';/g" family-budget-network/family-budget-network.php
          perl -0777 -i -pe "s/\$checked_data->response\[\$plugin_slug\]\s*=\s*\$plugin_info;/\$checked_data->response['family-budget-network\/family-budget-network.php'] = \$plugin_info;/g" family-budget-network/family-budget-network.php

          rm -f AI_TEST.md changelog.md

          printf '%s\n' "# AI Rules" "" "Active source: family-budget-network/" "" "Main plugin file: family-budget-network/family-budget-network.php" "" "Never edit root family-budget-network.php." "Never use current/ as active source." "Build release ZIP only from family-budget-network/." "ZIP must contain family-budget-network/family-budget-network.php." "" "Updater:" "slug = family-budget-network" "plugin field = family-budget-network/family-budget-network.php" "release asset = family-budget-network.zip" > AI_RULES.md

          printf '%s\n' "# Family Budget Network PRO" "" "Active source: family-budget-network/" "" "Main plugin file: family-budget-network/family-budget-network.php" "" "Current version: $VERSION" > README.md

          printf '%s\n' "# Changelog" "" "## $VERSION" "" "- Rebuilt repository structure." "- Active source moved to family-budget-network/." "- Fixed updater plugin slug." "- Fixed Invalid plugin slug." "- Release ZIP now builds from correct source folder." > CHANGELOG.md

          git add -A
          git commit -m "Rebuild Family Budget structure $VERSION" || true
          git push

      - name: Build ZIP
        run: |
          rm -rf build family-budget-network.zip
          mkdir -p build
          cp -R family-budget-network build/family-budget-network
          cd build
          zip -r ../family-budget-network.zip family-budget-network
          cd ..

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.inputs.release_version }}"
          gh release view "$VERSION" >/dev/null 2>&1 && gh release delete "$VERSION" -y --cleanup-tag || true
          gh release create "$VERSION" family-budget-network.zip --title "Family Budget Network PRO $VERSION" --notes "Family Budget Network PRO $VERSION

          - Correct plugin structure
          - Fixed Invalid plugin slug
          - ZIP built from family-budget-network/"
