name: AI Issue Worker

on:
  issues:
    types: [opened, edited, labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  ai-work:
    if: contains(github.event.issue.labels.*.name, 'ai-task')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Prepare task
        run: |
          cat > task.txt <<'EOF'
          You are working on the WordPress plugin repository familybudget.

          Task from GitHub Issue:

          TITLE:
          ${{ github.event.issue.title }}

          BODY:
          ${{ github.event.issue.body }}

          Rules:
          - Do not delete existing plugin functionality.
          - Prefer small safe changes.
          - If the task is a test, create only the requested test file.
          EOF

      - name: Install Aider
        run: |
          python -m pip install --upgrade pip
          pip install aider-chat

      - name: Run Aider
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          aider --yes --auto-commits --message-file task.txt

      - name: Push changes
        run: |
          git config user.name "familybudget-ai-bot"
          git config user.email "actions@github.com"
          git push || echo "Nothing to push"

      - name: Comment result
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'AI workflow finished. Check repository changes.'
            })
